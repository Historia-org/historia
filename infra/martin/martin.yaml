# Martin config — Phase 0: connection only.
# Phase 1: temporal function sources (MVT tiles filtered by date).
listen_addresses: "0.0.0.0:3000"

postgres:
  # DATABASE_URL is injected by docker-compose
  auto_publish:
    tables: false
    functions:
      # Any SQL function in the "tiles" schema becomes a tile source.
      # Phase 1 convention: tiles.features(z, x, y, query_params) with a "date" parameter.
      from_schemas:
        - tiles
